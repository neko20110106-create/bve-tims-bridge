name: Build ATS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore via dotnet
        run: dotnet restore src/AtsPlugin.csproj

      - name: Build
        run: msbuild src/AtsPlugin.csproj /p:Configuration=Release /p:Platform=x64

      - name: Upload built DLL
        uses: actions/upload-artifact@v4
        with:
          name: AtsPlugin-dll
          path: |
            src/bin/x64/Release/**/*.dll
